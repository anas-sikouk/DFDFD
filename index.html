<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AtlantaSanad OS | Enterprise Intelligent Agent</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Tajawal:wght@300;400;500;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>

    <style>
        :root {
            --primary-glow: #00f0ff;
            --secondary-glow: #0054A6;
            --bg-dark: #02040a;
            --glass-v1: rgba(10, 20, 40, 0.9);
            --glass-v2: rgba(255, 255, 255, 0.03);
            --border-glow: rgba(0, 240, 255, 0.3);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Tajawal', sans-serif; }
        .tech-font { font-family: 'Orbitron', sans-serif; }

        body {
            background-color: var(--bg-dark);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            color: #f8fafc;
        }

        /* --- ADVANCED 3D BACKGROUND --- */
        .grid-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: 
                linear-gradient(rgba(0, 240, 255, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 240, 255, 0.05) 1px, transparent 1px);
            background-size: 50px 50px;
            transform: perspective(500px) rotateX(60deg);
            transform-origin: center top;
            animation: gridMove 20s linear infinite;
            z-index: -1;
        }
        @keyframes gridMove { from { background-position: 0 0; } to { background-position: 0 1000px; } }

        /* --- APP ARCHITECTURE --- */
        .system-core {
            width: 100%; max-width: 500px; height: 94vh;
            background: var(--glass-v1);
            border-radius: 40px;
            border: 1px solid var(--border-glow);
            box-shadow: 0 0 50px rgba(0, 84, 166, 0.3), inset 0 0 30px rgba(0, 240, 255, 0.1);
            display: flex; flex-direction: column;
            position: relative; overflow: hidden;
            backdrop-filter: blur(25px);
        }

        /* Header UI */
        .sys-header {
            padding: 25px; border-bottom: 1px solid rgba(255,255,255,0.05);
            background: linear-gradient(to bottom, rgba(0,0,0,0.5), transparent);
        }

        .status-dot { width: 8px; height: 8px; background: #00ff88; border-radius: 50%; box-shadow: 0 0 10px #00ff88; }

        /* Chat Engine */
        #chat-engine { flex: 1; padding: 25px; overflow-y: auto; display: flex; flex-direction: column; gap: 20px; scrollbar-width: none; }
        #chat-engine::-webkit-scrollbar { display: none; }

        /* Bubble Engineering */
        .bubble {
            max-width: 85%; padding: 16px 20px; border-radius: 24px; font-size: 14.5px;
            line-height: 1.7; position: relative; transition: 0.3s;
            animation: slideIn 0.5s cubic-bezier(0.2, 0.8, 0.2, 1);
        }
        @keyframes slideIn { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }

        .bubble-bot {
            background: var(--glass-v2); border: 1px solid rgba(255,255,255,0.1);
            align-self: flex-start; border-bottom-right-radius: 4px;
        }
        .bubble-user {
            background: linear-gradient(135deg, var(--secondary-glow), #003d7a);
            align-self: flex-end; border-bottom-left-radius: 4px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3); border: 1px solid rgba(0, 240, 255, 0.2);
        }

        /* Feature Cards Inside Chat */
        .feature-card {
            background: rgba(255,255,255,0.03); border: 1px solid rgba(0,240,255,0.1);
            border-radius: 15px; padding: 12px; margin-top: 10px; display: grid; grid-template-columns: 40px 1fr; gap: 10px;
        }

        /* Interface Inputs */
        .ui-footer { padding: 20px; background: rgba(0,0,0,0.4); border-top: 1px solid rgba(255,255,255,0.05); }
        .input-wrapper {
            display: flex; background: rgba(255,255,255,0.05); border-radius: 20px; 
            padding: 8px; border: 1px solid rgba(255,255,255,0.1); transition: 0.3s;
        }
        .input-wrapper:focus-within { border-color: var(--primary-glow); box-shadow: 0 0 15px rgba(0,240,255,0.2); }
        .input-wrapper input { flex: 1; background: transparent; border: none; color: white; padding: 10px; outline: none; }
        
        .btn-send {
            width: 45px; height: 45px; background: var(--secondary-glow); border-radius: 15px;
            display: flex; align-items: center; justify-content: center; transition: 0.3s;
        }
        .btn-send:hover { background: var(--primary-glow); color: black; transform: scale(1.05); }

        /* Lead Gen Screen */
        #auth-screen {
            position: absolute; inset: 0; background: var(--bg-dark); z-index: 100;
            display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px;
        }

        .cyber-input {
            width: 100%; background: #0a101f; border: 1px solid #1e293b; padding: 18px;
            border-radius: 15px; margin-bottom: 15px; color: white; outline: none; transition: 0.3s;
        }
        .cyber-input:focus { border-color: var(--primary-glow); background: #0f172a; }

        .btn-launch {
            width: 100%; padding: 18px; background: linear-gradient(90deg, var(--secondary-glow), var(--primary-glow));
            color: white; border-radius: 15px; font-weight: 900; letter-spacing: 2px; transition: 0.4s;
        }
        .btn-launch:hover { letter-spacing: 4px; box-shadow: 0 0 30px var(--primary-glow); }

    </style>
</head>
<body>

    <div class="grid-bg"></div>

    <div class="system-core">
        <div id="auth-screen">
            <img src="https://upload.wikimedia.org/wikipedia/commons/d/d0/Logo_AtlantaSanad.png" class="w-20 mb-6" alt="AtlantaSanad">
            <h2 class="tech-font text-xl mb-2 tracking-tighter">AGENT IDENTITY CORE</h2>
            <p class="text-gray-500 text-xs mb-8 uppercase tracking-widest text-center">بوابة وكالة سيدي قاسم الذكية</p>
            
            <input type="text" id="node-name" class="cyber-input" placeholder="الاسم الكامل / Nom Complet">
            <input type="tel" id="node-phone" class="cyber-input" placeholder="رقم الهاتف / Téléphone">
            <select id="node-lang" class="cyber-input">
                <option value="ar">اللغة العربية (الدارجة)</option>
                <option value="fr">Français Professionnel</option>
            </select>
            
            <button onclick="Engine.launch()" class="btn-launch">LAUNCH SYSTEM</button>
        </div>

        <header class="sys-header flex justify-between items-center">
            <div class="flex items-center gap-4">
                <div class="relative">
                    <div class="w-12 h-12 rounded-full border-2 border-cyan-400 p-1">
                        <img src="https://upload.wikimedia.org/wikipedia/commons/d/d0/Logo_AtlantaSanad.png" class="w-full h-full object-contain" alt="Logo">
                    </div>
                    <div class="status-dot absolute bottom-0 right-0 border-2 border-black"></div>
                </div>
                <div>
                    <h3 class="font-black text-sm text-white tracking-wide">ATLANTA SANAD AI</h3>
                    <p class="text-[9px] text-cyan-400 uppercase font-bold tracking-tighter">Engineering Hub | Sidi Kacem</p>
                </div>
            </div>
            <div class="text-right">
                <p id="clock" class="tech-font text-xs text-white">00:00:00</p>
                <p class="text-[8px] text-gray-500 uppercase">SIDI KACEM - RDC</p>
            </div>
        </header>

        <div id="chat-engine">
            </div>

        <footer class="ui-footer" id="main-controls" style="display: none;">
            <div class="input-wrapper">
                <input type="text" id="logic-input" placeholder="اسأل عن التأمين، الحوادث، أو CNOPS...">
                <button onclick="Engine.process()" class="btn-send"><i class="fas fa-bolt"></i></button>
            </div>
            <p class="text-[8px] text-center text-gray-600 mt-3 uppercase tracking-widest">Powered by Engineering Logic v4.2</p>
        </footer>
    </div>

    <script>
        /**
         * ATLANTA SANAD ENGINE - SIDI KACEM BRANCH
         * PROFESSIONAL ARCHITECTURE
         */
        const Engine = {
            state: { user: null, active: false },
            
            // Comprehensive Logic Data
            registry: {
                ar: {
                    welcome: "تم تفعيل البروتوكول بنجاح. 🟢\nمرحباً سي {name} في وكالة أطلنطا سند سيدي قاسم (Nouveau Quartier). \nنحن هنا لتدبير تأميناتك باحترافية. اسألني عن: **السيارات**، **الحوادث**، **البناء**، أو **التغطية الصحية**.",
                    categories: {
                        auto: {
                            trigger: ['سيارة', 'طوموبيل', 'دراجة', 'موطور', 'ثلاثية', 'تخفيض', '10%', 'سنتين'],
                            content: `🚗 **منظومة تأمين المركبات:** <div class="feature-card"><i class="fas fa-check-circle text-cyan-400"></i> تشمل السيارات، الدراجات، والدراجات ثلاثية العجلات.</div>
                            <div class="highlight-box">
                                🎁 **قاعدة الوفاء (24 شهر):** بعد سنتين من الانخراط، نمنحك **خصم 10%** تلقائياً كزبون وفي.
                                <br>⚠️ **تنبيه هندسي:** في حالة وقوع حادثة وكنت **المسؤول**، يتم إلغاء هذا التخفيض فوراً لإعادة تقييم المخاطر.
                            </div>`
                        },
                        sinistre: {
                            trigger: ['حادث', 'كسيدة', 'خبير', 'تعويض', 'إصلاح', 'كونسطا', 'فاتورة', 'ديي'],
                            content: `⚠️ **بروتوكول تدبير الحوادث (Sinistre):**
                            إذا كنت **غير مسؤول** (أو مسؤوليتك أقل من 50%)، المسطرة كالتالي:
                            1️⃣ **التصريح:** إحضار Constat + صور الأضرار + Devis أولي.
                            2️⃣ **الخبرة:** نقوم بعمل Déclaration ونوجهك آلياً إلى **الخبير** المعتمد.
                            3️⃣ **الموافقة:** الخبير يراجع الأثمنة (يقبلها أو يعدلها) ويعطيك الضوء الأخضر للإصلاح.
                            4️⃣ **الاسترداد:** بعد الإصلاح، سلمنا **الفاتورة الأصلية** لنقوم بصرف التعويض لك.`
                        },
                        health: {
                            trigger: ['صحة', 'مرض', 'cnops', 'amc', 'كنوبس', 'تغطية', 'ملف', 'انخراط'],
                            content: `🏥 **إدارة التغطية الصحية (Medical Hub):**
                            <div class="feature-card"><i class="fas fa-file-medical text-cyan-400"></i> **Gestion des adhésions:** نكلف بتدبير انخراطاتكم وتتبعها.</div>
                            <div class="feature-card"><i class="fas fa-hospital text-cyan-400"></i> **CNOPS & AMC:** معالجة وتصريح ملفات التغطية الصحية التكميلية بكل دقة.</div>`
                        },
                        construction: {
                            trigger: ['بناء', 'ورش', 'عقار', 'بني', 'chantier'],
                            content: `🏗️ **تأمين البناء (Construction):** نوفر تغطية شاملة للمشاريع العقارية (Tous Risques Chantier) لضمان حماية استثماراتكم من الحوادث التقنية أو الأضرار الجسدية بالورش.`
                        },
                        contact: {
                            trigger: ['عنوان', 'فين', 'موقع', 'تواصل', 'رقم', 'فاكس'],
                            content: `📍 **البيانات اللوجستية:**
                            - **العنوان:** Nouveau Quartier, rue 5 imm. 80 n°3 rdc, Sidi Kacem.
                            - **الفاكس/الهاتف:** 0537595910.
                            - **طرق التواصل:** متاحون عبر الهاتف والفاكس والزيارة المباشرة للوكالة.`
                        }
                    },
                    fallback: "🤖 **نظام التحليل:** لم أتمكن من تحديد الخدمة المطلوبة بدقة. هل تقصد (تأمين السيارات، مسطرة التعويض عن الحوادث، أو ملفات CNOPS الصحية)؟"
                },
                fr: {
                    welcome: "Protocole activé. 🟢\nBienvenue M. {name} au Hub Digital d'AtlantaSanad Sidi Kacem. \nExpertise en: **Auto**, **Sinistre**, **Construction** et **Santé (CNOPS/AMC)**.",
                    categories: {
                        auto: {
                            trigger: ['auto', 'voiture', 'moto', 'triporteur', 'remise', '10%', 'fidélité'],
                            content: `🚗 **Assurance Mobilité :** <div class="feature-card"><i class="fas fa-check-circle text-cyan-400"></i> Auto, Moto et **Triporteurs**.</div>
                            <div class="highlight-box">
                                🎁 **Règle Fidélité (24 mois):** Après 2 ans, profitez de **10% de remise**.
                                <br>⚠️ **Attention:** En cas de sinistre responsable, cette remise est annulée.
                            </div>`
                        },
                        sinistre: {
                            trigger: ['accident', 'sinistre', 'expert', 'réparation', 'constat', 'devis', 'facture'],
                            content: `⚠️ **Gestion des Sinistres :**
                            Si responsabilité < 50% :
                            1️⃣ **Déclaration:** Apportez Constat + Photos + Devis.
                            2️⃣ **Expertise:** Nous lançons la déclaration et l'expertise technique.
                            3️⃣ **Réparation:** Une fois le devis validé par l'expert, lancez les travaux.
                            4️⃣ **Remboursement:** Remettez-nous la **Facture originale** pour paiement.`
                        },
                        health: {
                            trigger: ['santé', 'maladie', 'cnops', 'amc', 'mutuelle', 'adhésion'],
                            content: `🏥 **Pôle Santé :**
                            <div class="feature-card"><i class="fas fa-file-medical text-cyan-400"></i> **Gestion des adhésions:** Suivi rigoureux de vos contrats.</div>
                            <div class="feature-card"><i class="fas fa-hospital text-cyan-400"></i> **CNOPS & AMC:** Déclarations et suivi des remboursements maladie.</div>`
                        },
                        construction: {
                            trigger: ['construction', 'chantier', 'bâtiment', 'décennale'],
                            content: `🏗️ **Assurance Construction :** Protection complète pour vos chantiers contre les risques techniques et dommages ouvrage.`
                        },
                        contact: {
                            trigger: ['adresse', 'où', 'lieu', 'fax', 'contact', 'téléphone'],
                            content: `📍 **Coordonnées :**
                            - **Adresse:** Nouveau Quartier, rue 5 imm. 80 n°3 rdc, Sidi Kacem.
                            - **Fax/Tél:** 0537595910.`
                        }
                    },
                    fallback: "🤖 **Analyseur:** Requête non reconnue. Souhaitez-vous des infos sur l'Auto, la procédure de Sinistre ou la Santé (AMC)?"
                }
            },

            launch() {
                const n = document.getElementById('node-name').value.trim();
                const p = document.getElementById('node-phone').value.trim();
                const l = document.getElementById('node-lang').value;

                if(n.length < 3 || p.length < 10) return alert("Validation Failed: Enter Full Identity.");

                this.state.user = { name: n, phone: p, lang: l };
                
                // CRM Sync
                emailjs.init("bqWg9HMcoZY_pllTx");
                emailjs.send("service_3elb747", "template_lbf8ayd", { 
                    from_name: n, phone_number: p, selected_language: l, source: "Advanced Engineering V4" 
                });

                document.getElementById('auth-screen').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('auth-screen').style.display = 'none';
                    document.getElementById('main-controls').style.display = 'block';
                    this.say(this.registry[l].welcome.replace('{name}', n), 'bot');
                }, 500);
            },

            process() {
                const input = document.getElementById('logic-input');
                const rawText = input.value.trim();
                if(!rawText) return;

                this.say(rawText, 'user');
                input.value = "";

                const lang = this.state.user.lang;
                const query = rawText.toLowerCase();
                let match = null;

                for (let key in this.registry[lang].categories) {
                    if(this.registry[lang].categories[key].trigger.some(t => query.includes(t))) {
                        match = this.registry[lang].categories[key].content;
                        break;
                    }
                }

                setTimeout(() => {
                    this.say(match || this.registry[lang].fallback, 'bot');
                }, 700);
            },

            say(txt, side) {
                const viewport = document.getElementById('chat-engine');
                const div = document.createElement('div');
                div.className = `bubble bubble-${side}`;
                div.innerHTML = txt.replace(/\n/g, '<br>');
                viewport.appendChild(div);
                viewport.scrollTo({ top: viewport.scrollHeight, behavior: 'smooth' });
            }
        };

        // Real-time Clock Logic
        setInterval(() => {
            const d = new Date();
            document.getElementById('clock').innerText = d.toTimeString().split(' ')[0];
        }, 1000);

        // Enter Key Listener
        document.getElementById('logic-input').addEventListener('keypress', (e) => { if(e.key === 'Enter') Engine.process(); });
    </script>
</body>
</html>
