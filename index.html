<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AtlantaSanad | Sidi Kacem Advanced Hub v7</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>

    <style>
        :root {
            --atlanta-blue: #0054A6;
            --atlanta-gold: #FFD700;
            --bg-light: #f1f5f9;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Tajawal', sans-serif; }
        body { background: #1e293b; height: 100vh; display: flex; align-items: center; justify-content: center; overflow: hidden; }

        .app-container {
            width: 100%; max-width: 480px; height: 92vh;
            background: white; border-radius: 25px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            display: flex; flex-direction: column; position: relative; overflow: hidden;
        }

        header {
            background: linear-gradient(135deg, var(--atlanta-blue), #003366);
            padding: 20px; color: white; border-bottom: 3px solid var(--atlanta-gold);
        }

        #chat-stream {
            flex: 1; padding: 15px; overflow-y: auto; background: var(--bg-light);
            display: flex; flex-direction: column; gap: 12px;
        }

        /* Bubbles */
        .bubble {
            max-width: 85%; padding: 12px 16px; border-radius: 18px; font-size: 14px;
            line-height: 1.5; position: relative; animation: slideUp 0.3s ease;
        }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .bubble-bot { background: white; color: #334155; align-self: flex-start; border-bottom-right-radius: 2px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .bubble-user { background: var(--atlanta-blue); color: white; align-self: flex-end; border-bottom-left-radius: 2px; }

        /* Quick Actions Grid */
        .quick-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
        .action-btn {
            background: white; border: 1px solid #cbd5e1; padding: 10px; border-radius: 12px;
            text-align: center; font-size: 12px; font-weight: bold; cursor: pointer; transition: 0.2s;
        }
        .action-btn:hover { border-color: var(--atlanta-blue); color: var(--atlanta-blue); background: #f8fafc; }

        /* WhatsApp Floating Button */
        .wa-float {
            position: absolute; bottom: 85px; left: 20px;
            background: #25D366; color: white; width: 50px; height: 50px;
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2); cursor: pointer; z-index: 100;
        }

        .footer-control { padding: 15px; background: white; border-top: 1px solid #e2e8f0; display: none; }
        .input-group { display: flex; background: #f8fafc; border-radius: 25px; padding: 5px 15px; border: 1px solid #cbd5e1; }
        .input-group input { flex: 1; background: transparent; border: none; padding: 10px; outline: none; }
    </style>
</head>
<body>

    <div class="app-container">
        <!-- WhatsApp Shortcut -->
        <a href="https://wa.me/212600000000" target="_blank" class="wa-float">
            <i class="fab fa-whatsapp text-2xl"></i>
        </a>

        <header class="flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="bg-white p-1 rounded-lg w-12 h-12 flex items-center justify-center">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/d/d0/Logo_AtlantaSanad.png" class="w-full">
                </div>
                <div>
                    <h1 class="text-sm font-black">أطلنطا سند | سيدي قاسم</h1>
                    <p class="text-[10px] opacity-90">الوكالة الرقمية الذكية v7.0</p>
                </div>
            </div>
            <i class="fas fa-ellipsis-v opacity-70"></i>
        </header>

        <div id="chat-stream">
            <!-- Messages appear here -->
        </div>

        <footer class="footer-control" id="footer-ui">
            <div class="input-group">
                <input type="text" id="user-msg" placeholder="اكتب استفسارك هنا...">
                <button onclick="App.handleChat()" class="text-blue-600 px-2">
                    <i class="fas fa-paper-plane"></i>
                </button>
            </div>
        </footer>
    </div>

    <script>
        const App = {
            state: { user: null, lang: 'ar' },
            
            data: {
                ar: {
                    welcome: "مرحباً بك في وكالة سيدي قاسم الرقمية. نسهل عليك خدمات التأمين دون عناء التنقل.",
                    ask_name: "قبل البدء، ممكن نتعرف على الاسم الكريم ورقم الهاتف؟",
                    services_intro: "كيف يمكننا مساعدتك اليوم يا {name}؟ اختر أحد الأقسام التالية:",
                    options: [
                        { id: 'auto', text: '🚗 تأمين المركبات', icon: 'fa-car' },
                        { id: 'sinistre', text: '⚠️ وضعية حادث', icon: 'fa-exclamation-triangle' },
                        { id: 'health', text: '🏥 ملفات الصحة', icon: 'fa-file-medical' },
                        { id: 'contact', text: '📍 موقع الوكالة', icon: 'fa-map-marker-alt' }
                    ],
                    responses: {
                        auto: "نؤمن جميع أنواع المركبات (سيارات، دراجات، شاحنات). <b>تذكير:</b> تستفيد من خصم 10% عند تجديد سنتين بدون حوادث! 🎁",
                        sinistre: "في حالة حادث (Constat):<br>1️⃣ قم بتصوير الحادث فوراً.<br>2️⃣ أحضر المحضر (Constat) للوكالة.<br>3️⃣ سنقوم بتعيين خبير في أقل من 24 ساعة.",
                        health: "ندبر ملفات CNOPS و AMC. يمكنك تتبع تعويضاتك مباشرة عبر وضع رقم الانخراط هنا أو زيارتنا.",
                        contact: "📍 عنواننا: سيدي قاسم، الحي الجديد، زنقة 5، عمارة 80.<br>📞 هاتف: 0537595910"
                    }
                }
            },

            init() {
                this.say(this.data.ar.welcome, 'bot');
                setTimeout(() => this.renderAuth(), 1000);
            },

            renderAuth() {
                const stream = document.getElementById('chat-stream');
                const div = document.createElement('div');
                div.className = "action-card bg-white p-4 rounded-2xl shadow-sm border border-slate-200 mt-2";
                div.innerHTML = `
                    <p class="text-xs font-bold mb-3 text-slate-500 text-center">التسجيل السريع</p>
                    <input type="text" id="reg-n" class="w-full p-3 bg-slate-100 rounded-xl mb-2 text-sm outline-none" placeholder="الاسم الكامل">
                    <input type="tel" id="reg-p" class="w-full p-3 bg-slate-100 rounded-xl mb-3 text-sm outline-none" placeholder="رقم الهاتف">
                    <button onclick="App.handleAuth()" class="w-full bg-blue-600 text-white p-3 rounded-xl font-bold text-sm">دخول</button>
                `;
                stream.appendChild(div);
                this.scroll();
            },

            handleAuth() {
                const n = document.getElementById('reg-n').value;
                const p = document.getElementById('reg-p').value;
                if(n.length < 3 || p.length < 10) return alert("المرجو إدخال بيانات صحيحة");

                this.state.user = { name: n, phone: p };
                document.querySelector('.action-card').style.display = 'none';
                this.say(`مرحباً، أنا ${n}`, 'user');
                
                setTimeout(() => this.showMenu(), 800);
                
                // Notify via EmailJS (Keep your existing credentials)
                emailjs.init("bqWg9HMcoZY_pllTx");
                emailjs.send("service_3elb747", "template_lbf8ayd", { from_name: n, phone: p });
            },

            showMenu() {
                this.say(this.data.ar.services_intro.replace('{name}', this.state.user.name), 'bot');
                const stream = document.getElementById('chat-stream');
                const grid = document.createElement('div');
                grid.className = "quick-grid";
                
                this.data.ar.options.forEach(opt => {
                    grid.innerHTML += `<div class="action-btn" onclick="App.handleChoice('${opt.id}')">
                        <i class="fas ${opt.icon} block text-blue-600 text-lg mb-1"></i> ${opt.text}
                    </div>`;
                });
                
                stream.appendChild(grid);
                document.getElementById('footer-ui').style.display = 'block';
                this.scroll();
            },

            handleChoice(id) {
                this.say(this.data.ar.responses[id], 'bot');
            },

            handleChat() {
                const input = document.getElementById('user-msg');
                const val = input.value.trim();
                if(!val) return;
                
                this.say(val, 'user');
                input.value = "";
                
                // Simple AI Logic
                setTimeout(() => {
                    if(val.includes("تأمين") || val.includes("ثمن")) this.handleChoice('auto');
                    else if(val.includes("حادث") || val.includes("كسيدة")) this.handleChoice('sinistre');
                    else this.say("شكراً لتواصلك. يمكنك أيضاً الضغط على أيقونة الواتساب للتحدث مباشرة مع وكيلنا.", 'bot');
                }, 600);
            },

            say(txt, side) {
                const s = document.getElementById('chat-stream');
                const d = document.createElement('div');
                d.className = `bubble bubble-${side}`;
                d.innerHTML = txt;
                s.appendChild(d);
                this.scroll();
            },

            scroll() {
                const s = document.getElementById('chat-stream');
                s.scrollTo({ top: s.scrollHeight, behavior: 'smooth' });
            }
        };

        window.onload = () => App.init();
    </script>
</body>
</html>
