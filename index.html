<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AtlantaSanad AI | Sidi Kacem Agency</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>

    <style>
        :root { --p-blue: #0054A6; --p-gold: #C5A059; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Tajawal', sans-serif; }
        body { 
            background: radial-gradient(circle at center, #1e293b 0%, #020617 100%);
            height: 100vh; display: flex; align-items: center; justify-content: center; overflow: hidden;
        }
        
        .app-shell { 
            width: 100%; max-width: 500px; height: 94vh; 
            background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(20px);
            border-radius: 30px; display: flex; flex-direction: column; 
            box-shadow: 0 50px 100px rgba(0,0,0,0.6); border: 1px solid rgba(255,255,255,0.4);
            position: relative; overflow: hidden;
        }

        .chat-container { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; scrollbar-width: none; }
        .bubble { max-width: 85%; padding: 15px; border-radius: 20px; font-size: 14.5px; line-height: 1.6; animation: pop 0.3s ease-out; position: relative; }
        .bubble-bot { background: white; align-self: flex-start; border-bottom-right-radius: 4px; border: 1px solid #e2e8f0; color: #1e293b; box-shadow: 0 4px 6px rgba(0,0,0,0.02); }
        .bubble-user { background: linear-gradient(135deg, var(--p-blue), #003d7a); color: white; align-self: flex-end; border-bottom-left-radius: 4px; }

        .onboarding-form { background: white; border: 1px solid #e2e8f0; padding: 25px; border-radius: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .input-style { width: 100%; padding: 12px; border-radius: 12px; border: 1.5px solid #e2e8f0; outline: none; transition: 0.3s; font-size: 14px; }
        .input-style:focus { border-color: var(--p-blue); box-shadow: 0 0 0 4px rgba(0, 84, 166, 0.1); }
        
        .btn-start { background: var(--p-blue); color: white; padding: 14px; border-radius: 12px; font-weight: 800; width: 100%; margin-top: 10px; cursor: pointer; transition: 0.3s; }
        .btn-start:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0, 84, 166, 0.3); }

        .typing-loader { display: flex; gap: 4px; padding: 5px; }
        .dot { width: 6px; height: 6px; background: #cbd5e1; border-radius: 50%; animation: blink 1.4s infinite; }
        @keyframes blink { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }
        @keyframes pop { from { opacity: 0; transform: scale(0.9) translateY(10px); } }
    </style>
</head>
<body>

<div class="app-shell">
    <header class="p-5 bg-white border-b flex items-center justify-between z-10 shadow-sm">
        <div class="flex items-center gap-3">
            <img src="https://upload.wikimedia.org/wikipedia/commons/d/d0/Logo_AtlantaSanad.png" class="w-10" alt="Logo">
            <div>
                <p class="text-[10px] font-black text-blue-600 tracking-tighter uppercase">Sidi Kacem Agency</p>
                <h1 class="text-sm font-black text-slate-800">أطلنطا سند - المساعد الذكي</h1>
            </div>
        </div>
        <a href="tel:0537595910" class="w-10 h-10 bg-green-500 text-white rounded-full flex items-center justify-center shadow-md hover:scale-110 transition"><i class="fas fa-phone"></i></a>
    </header>

    <div id="chat-box" class="chat-container">
        <div class="onboarding-form" id="setup-box">
            <h2 class="text-center font-black text-slate-700 mb-5 text-lg">مرحباً بك في وكالة سيدي قاسم</h2>
            <div class="space-y-4">
                <div>
                    <label class="text-[11px] font-bold text-slate-400 block mb-1">الاسم الكامل / NOM COMPLET</label>
                    <input type="text" id="user-name" class="input-style" placeholder="مثال: محمد العلمي">
                </div>
                <div>
                    <label class="text-[11px] font-bold text-slate-400 block mb-1">رقم الهاتف / TÉLÉPHONE</label>
                    <input type="tel" id="user-phone" class="input-style" placeholder="06 / 07 ...">
                </div>
                <div>
                    <label class="text-[11px] font-bold text-slate-400 block mb-1">اللغة / LANGUE</label>
                    <select id="user-lang" class="input-style">
                        <option value="ar">الدارجة المغربية 🇲🇦</option>
                        <option value="fr">Français 🇫🇷</option>
                    </select>
                </div>
                <button onclick="startExperience()" class="btn-start">دخول المحادثة</button>
            </div>
        </div>
    </div>

    <footer class="p-4 bg-white border-t" id="input-bar" style="display: none;">
        <div class="flex gap-2 bg-slate-100 p-2 rounded-2xl border border-slate-200 shadow-inner">
            <input type="text" id="msg-input" class="flex-1 bg-transparent p-2 outline-none text-sm font-medium" placeholder="اسأل عن التأمين، الأسعار، الحوادث...">
            <button onclick="processInput()" class="bg-blue-600 text-white w-11 h-11 rounded-xl shadow-md flex items-center justify-center hover:bg-blue-700 transition"><i class="fas fa-paper-plane"></i></button>
        </div>
    </footer>
</div>

<script>
    // الإعدادات التقنية
    const OPENROUTER_API_KEY = "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";
    let activeUser = { name: '', phone: '', lang: 'ar' };

    // 1. قاعدة البيانات الموسعة (Local Expert DB)
    const LOCAL_KNOWLEDGE = {
        'ar': {
            'welcome': "شكراً سي {name}! ❤️ أنا المساعد الذكي لوكالة سيدي قاسم. كيفاش نقدر نعاونك بخصوص تأمين السيارات، السكن أو الحوادث؟",
            'db': {
                'auto': "🚗 **تأمين السيارات:** نوفر عروضاً متميزة للدراجات، السيارات، والشاحنات. احصل على خصم **10%** بعد سنتين بدون حوادث. يرجى إحضار البطاقة الرمادية للوكالة للحصول على تسعيرة دقيقة.",
                'loc': "📍 **الموقع:** وكالتنا تتواجد في قلب سيدي قاسم: Nouveau Quartier, rue 5 imm. 80 n°3 rdc.",
                'time': "🕒 **أوقات العمل:** من الاثنين إلى الجمعة (08:30 – 18:30). السبت (08:30 – 13:00).",
                'accident': "⚠️ **في حالة حادثة:** حافظ على هدوئك. قم بملء المعاينة الودية (الكونسطا) وصور الأضرار، ثم زرنا في الوكالة مع عقد التأمين لنباشر إجراءات التعويض.",
                'health': "🏥 **التغطية الصحية:** ندبر ملفات CNOPS و AMC لضمان تعويضات سريعة ومتابعة دقيقة لملفاتكم المرضية.",
                'home': "🏠 **تأمين السكن:** احمِ منزلك من السرقة، الحريق، وتسربات المياه بأثمنة جد مناسبة سنوياً."
            }
        },
        'fr': {
            'welcome': "Merci M. {name} ! 👋 Je suis l'assistant digital de l'agence Sidi Kacem. Comment puis-je vous aider (Auto, Habitation, Sinistres) ?",
            'db': {
                'auto': "🚗 **Assurance Auto :** Tarifs compétitifs pour voitures et motos. **10% de remise** fidélité après 2 ans. Veuillez apporter votre Carte Grise à l'agence pour un devis.",
                'loc': "📍 **Localisation :** Notre agence est située à : Nouveau Quartier, rue 5 imm. 80 n°3 rdc, Sidi Kacem.",
                'time': "🕒 **Horaires :** Lundi au Vendredi (08h30 – 18h30). Samedi (08h30 – 13h00).",
                'accident': "⚠️ **Sinistre :** Remplissez le constat amiable, prenez des photos et présentez-vous à l'agence avec votre contrat d'assurance.",
                'health': "🏥 **Santé :** Nous gérons vos dossiers CNOPS et AMC pour un remboursement rapide et efficace.",
                'home': "🏠 **Habitation :** Protégez votre foyer contre le vol et l'incendie à des tarifs très attractifs."
            }
        }
    };

    // 2. الكلمات المفتاحية الذكية (Keyword Mapping)
    const KEYWORD_MAP = {
        'سعر': 'auto', 'ثمن': 'auto', 'طوموبيل': 'auto', 'سيارة': 'auto', 'prix': 'auto', 'devis': 'auto',
        'فين': 'loc', 'بلاصتكم': 'loc', 'عنوان': 'loc', 'adresse': 'loc', 'lieu': 'loc', 'location': 'loc',
        'وقت': 'time', 'ساعة': 'time', 'خدمة': 'time', 'horaire': 'time', 'ouvert': 'time', 'فتح': 'time',
        'كسيدة': 'accident', 'حادثة': 'accident', 'constat': 'accident', 'accident': 'accident', 'sinistre': 'accident',
        'مرض': 'health', 'دوسي': 'health', 'طبيب': 'health', 'cnops': 'health', 'amc': 'health', 'santé': 'health',
        'دار': 'home', 'سكن': 'home', 'maison': 'home', 'habitation': 'home'
    };

    function startExperience() {
        const n = document.getElementById('user-name').value.trim();
        const p = document.getElementById('user-phone').value.trim();
        const l = document.getElementById('user-lang').value;

        if (n.length < 3 || p.length < 10) {
            alert(l === 'ar' ? "المرجو إدخال معلومات صحيحة!" : "Veuillez entrer des informations valides !");
            return;
        }

        activeUser = { name: n, phone: p, lang: l };

        // إرسال عبر EmailJS
        emailjs.init("bqWg9HMcoZY_pllTx");
        emailjs.send("service_3elb747", "template_lbf8ayd", {
            from_name: n, phone_number: p, selected_language: l, agency: "Sidi Kacem"
        });

        document.getElementById('setup-box').style.display = 'none';
        document.getElementById('input-bar').style.display = 'block';

        const welcome = LOCAL_KNOWLEDGE[l].welcome.replace('{name}', n);
        addMessage(welcome, 'bot');
    }

    async function processInput() {
        const inp = document.getElementById('msg-input');
        const text = inp.value.trim();
        if (!text) return;

        addMessage(text, 'user');
        inp.value = "";

        let found = false;
        const lowerText = text.toLowerCase();

        // البحث في الكلمات المفتاحية أولاً (سرعة الاستجابة)
        for (let key in KEYWORD_MAP) {
            if (lowerText.includes(key)) {
                const dbKey = KEYWORD_MAP[key];
                const reply = LOCAL_KNOWLEDGE[activeUser.lang].db[dbKey];
                setTimeout(() => addMessage(reply, 'bot'), 600);
                found = true;
                break;
            }
        }

        // إذا لم يجد رد محلي، ننتقل للذكاء الاصطناعي
        if (!found) {
            const tempId = "loader-" + Date.now();
            addMessage('<div class="typing-loader"><div class="dot"></div><div class="dot" style="animation-delay:0.2s"></div><div class="dot" style="animation-delay:0.4s"></div></div>', 'bot', tempId);

            try {
                const response = await fetch("https://openrouter.ai/api/v1/chat/completions", {
                    method: "POST",
                    headers: {
                        "Authorization": `Bearer ${OPENROUTER_API_KEY}`,
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        model: "gpt-4o-mini",
                        messages: [
                            { role: "system", content: `You are the official AI assistant for AtlantaSanad Sidi Kacem. User name: ${activeUser.name}. Respond in Moroccan Darija if the user speaks Arabic. Agency Address: Nouveau Quartier, Sidi Kacem. Tel: 0537595910. Be professional and helpful.` },
                            { role: "user", content: text }
                        ]
                    })
                });
                const data = await response.json();
                document.getElementById(tempId).remove();
                addMessage(data.choices[0].message.content, 'bot');
            } catch (e) {
                document.getElementById(tempId).innerHTML = "عذراً، حدث خطأ في الاتصال. المرجو المحاولة لاحقاً.";
            }
        }
    }

    function addMessage(content, side, id = "") {
        const box = document.getElementById('chat-box');
        const div = document.createElement('div');
        div.className = `bubble bubble-${side}`;
        if (id) div.id = id;
        div.innerHTML = content;
        box.appendChild(div);
        box.scrollTop = box.scrollHeight;
    }

    document.getElementById('msg-input').addEventListener('keypress', (e) => { if (e.key === 'Enter') processInput(); });
</script>
</body>
</html>
