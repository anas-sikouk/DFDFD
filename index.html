<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AtlantaSanad Smart Bot V10</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>

    <style>
        :root { --main: #0054A6; --gold: #FFD700; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Tajawal', sans-serif; }
        body { background: #0f172a; height: 100vh; display: flex; align-items: center; justify-content: center; overflow: hidden; }

        .app-window {
            width: 100%; max-width: 450px; height: 95vh; background: #f8fafc;
            border-radius: 30px; box-shadow: 0 40px 100px rgba(0,0,0,0.4);
            display: flex; flex-direction: column; position: relative; border: 2px solid rgba(255,255,255,0.1);
        }

        header {
            background: linear-gradient(135deg, var(--main), #002244); padding: 18px; color: white;
            border-bottom: 3px solid var(--gold); border-radius: 28px 28px 0 0;
        }

        #chat-box { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; }
        
        .bubble { 
            max-width: 85%; padding: 14px; border-radius: 18px; font-size: 14px; line-height: 1.6;
            animation: fadeIn 0.3s ease; position: relative;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        .bot { background: white; color: #1e293b; align-self: flex-start; border: 1px solid #e2e8f0; border-bottom-right-radius: 2px; shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .user { background: var(--main); color: white; align-self: flex-end; border-bottom-left-radius: 2px; }

        .card-3d {
            background: white; border: 2px solid #e2e8f0; padding: 20px; border-radius: 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05); margin: 10px 0;
        }
        .sys-input { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #ddd; margin-bottom: 10px; outline: none; }
        .btn-3d {
            width: 100%; padding: 12px; border-radius: 10px; background: var(--main); color: white;
            font-weight: 700; border: none; cursor: pointer; transition: 0.2s; box-shadow: 0 4px 0 #002244;
        }
        .btn-3d:active { transform: translateY(3px); box-shadow: none; }

        .footer-bar { padding: 15px; background: white; border-top: 1px solid #eee; display: none; }
        .input-group { display: flex; background: #f1f5f9; border-radius: 30px; padding: 5px 15px; border: 1px solid #ddd; }
        .input-group input { flex: 1; background: transparent; border: none; padding: 8px; outline: none; }
    </style>
</head>
<body>

    <div class="app-window">
        <header class="flex items-center gap-3">
            <img src="https://upload.wikimedia.org/wikipedia/commons/d/d0/Logo_AtlantaSanad.png" class="w-10 h-10 bg-white p-1 rounded-lg">
            <div>
                <h1 class="text-xs font-black uppercase">AtlantaSanad | Sidi Kacem</h1>
                <div id="status-tag" class="text-[9px] font-bold"></div>
            </div>
        </header>

        <div id="chat-box"></div>

        <footer class="footer-bar" id="input-area">
            <div class="input-group">
                <input type="text" id="msg-input" placeholder="اكتب سؤالك هنا / Posez votre question...">
                <button onclick="App.processInput()" class="text-blue-700 ml-2"><i class="fas fa-paper-plane"></i></button>
            </div>
        </footer>
    </div>

    <script>
        const App = {
            user: null,
            
            // قاعدة البيانات الموسعة والمحسنة
            kb: {
                auto: {
                    keys: ['سيار', 'طوموبيل', 'موطور', 'دراجة', 'تريبورتور', 'auto', 'voiture', 'assurance', 'moto'],
                    ar: "🚗 <b>تأمين السيارات:</b> عندنا أحسن الأثمنة! وما تنساش بلي سنتين بلا حادثة (بمسؤوليتك) كتعطيك <b>10% تخفيض</b> فالتجديد الجاي. 🎁",
                    fr: "🚗 <b>Assurance Auto:</b> Nous offrons les meilleurs tarifs ! N'oubliez pas que 2 ans sans sinistre responsable vous donnent <b>10% de remise</b>."
                },
                accident: {
                    keys: ['حادث', 'كسيدة', 'كونسطا', 'خبير', 'تعويض', 'صلح', 'accident', 'sinistre', 'constat', 'expert', 'remboursement'],
                    ar: "⚠️ <b>عندك حادثة؟</b> ماتقلقش. جيب لينا الكونسطا والتصاور والديڤي (Devis)، وحنا غنتكلفو بالباقي مع الخبير باش تعوض فأسريع وقت. ⚡",
                    fr: "⚠️ <b>Sinistre ?</b> Apportez le constat, les photos et le devis. Nous gérons l'expertise pour un remboursement rapide."
                },
                health: {
                    keys: ['صحة', 'دوا', 'مرض', 'طبيب', 'تعاضدية', 'cnops', 'amc', 'sante', 'medical', 'mutuelle'],
                    ar: "🏥 <b>الملفات الصحية:</b> كندبرو ملفات CNOPS و AMC. جيب لينا الملف وحنا غنتبعوه ليك باش يوصلك التعويض ديالك كامل. 💉",
                    fr: "🏥 <b>Santé:</b> Nous gérons vos dossiers CNOPS et AMC avec un suivi rigoureux de vos remboursements."
                },
                contact: {
                    keys: ['فين', 'موقع', 'عنوان', 'رقم', 'هاتف', 'adresse', 'localisation', 'tel', 'fax', 'contact'],
                    ar: "📍 <b>موقعنا:</b> سيدي قاسم، الحي الجديد، زنقة 5، عمارة 80. <br>📞 هاتف/فاكس: <b>0537595910</b>",
                    fr: "📍 <b>Adresse:</b> Sidi Kacem, Nouveau Quartier, Rue 5, Imm 80. <br>📞 Tél/Fax: <b>0537595910</b>"
                }
            },

            init() {
                this.updateTime();
                this.say("مرحباً بك في أطلنطا سند سيدي قاسم! 🏛️<br>Bienvenue chez AtlantaSanad !", 'bot');
                this.showReg();
            },

            updateTime() {
                const now = new Date();
                const day = now.getDay();
                const hr = now.getHours();
                const open = (day >= 1 && day <= 5 && hr >= 8 && hr < 18) || (day === 6 && hr >= 9 && hr < 13);
                const tag = document.getElementById('status-tag');
                tag.innerHTML = open ? "🟢 OPEN / مفتوح" : "🔴 CLOSED / مغلق";
                tag.style.color = open ? "#4ade80" : "#fb7185";
            },

            showReg() {
                const box = document.getElementById('chat-box');
                const card = document.createElement('div');
                card.className = "card-3d";
                card.innerHTML = `
                    <p class="text-xs font-bold mb-3">المرجو إدخال معلوماتك / Vos infos :</p>
                    <input type="text" id="u-n" class="sys-input" placeholder="الاسم الكامل / Nom">
                    <input type="tel" id="u-p" class="sys-input" placeholder="رقم الهاتف / Tél">
                    <button class="btn-3d" onclick="App.saveReg()">دخول / Entrer</button>
                `;
                box.appendChild(card);
            },

            saveReg() {
                const n = document.getElementById('u-n').value;
                const p = document.getElementById('u-p').value;
                if(n.length < 2 || p.length < 10) return alert("خطأ في البيانات!");
                this.user = { name: n, phone: p };
                document.querySelector('.card-3d').style.display = 'none';
                this.say(n, 'user');
                setTimeout(() => this.askType(), 500);
                
                emailjs.init("bqWg9HMcoZY_pllTx");
                emailjs.send("service_3elb747", "template_lbf8ayd", { from_name: n, phone: p });
            },

            askType() {
                const box = document.getElementById('chat-box');
                const card = document.createElement('div');
                card.className = "card-3d text-center";
                card.innerHTML = `
                    <p class="mb-3 text-sm font-bold">هل أنت زبون قديم أم جديد؟<br>Client actuel ou nouveau ?</p>
                    <button class="btn-3d mb-2 bg-green-600" onclick="App.setType('old')">زبون الوكالة / Client</button>
                    <button class="btn-3d" onclick="App.setType('new')">جديد / Nouveau</button>
                `;
                box.appendChild(card);
                this.scroll();
            },

            setType(t) {
                document.querySelectorAll('.card-3d').forEach(c => c.style.display = 'none');
                const msg = t === 'old' ? "أنا زبون قديم 💎" : "أنا زبون جديد 🆕";
                this.say(msg, 'user');
                setTimeout(() => {
                    this.say(t === 'old' ? "مرحباً بوفائك! كيف يمكنني خدمتك؟" : "مرحباً بك! نحن هنا لنقدم لك أفضل عروض التأمين.", 'bot');
                    document.getElementById('input-area').style.display = 'block';
                }, 600);
            },

            processInput() {
                const inp = document.getElementById('msg-input');
                const val = inp.value.trim().toLowerCase();
                if(!val) return;

                this.say(val, 'user');
                inp.value = "";

                // اكتشاف اللغة (إذا كانت تحتوي على أحرف لاتينية فهي فرنسية)
                const lang = /[a-z]/.test(val) ? 'fr' : 'ar';
                let found = false;

                setTimeout(() => {
                    // البحث في الكلمات المفتاحية
                    for (let key in this.kb) {
                        if (this.kb[key].keys.some(k => val.includes(k))) {
                            this.say(this.kb[key][lang], 'bot');
                            found = true;
                            break;
                        }
                    }

                    if (!found) {
                        this.say(lang === 'ar' ? "لم أفهم سؤالك جيداً، جرب كلمات مثل (تأمين، حادثة، عنوان، ملف صحي)." : "Je n'ai pas compris. Essayez (assurance, sinistre, adresse, santé).", 'bot');
                    }
                }, 700);
            },

            say(txt, side) {
                const box = document.getElementById('chat-box');
                const d = document.createElement('div');
                d.className = `bubble ${side}`;
                d.innerHTML = txt;
                box.appendChild(d);
                this.scroll();
            },

            scroll() { const b = document.getElementById('chat-box'); b.scrollTo({top: b.scrollHeight, behavior: 'smooth'}); }
        };

        window.onload = () => App.init();
    </script>
</body>
</html>
